server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # SPA fallback — no cache on HTML
    location /helios/ {
        try_files $uri $uri/ /helios/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Vite hashed assets — cache forever
    location /helios/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Runtime config — never cache
    location = /helios/config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = / {
        return 301 /helios/;
    }
}
