services:
  node-base:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    entrypoint: ["sh", "-c", "npm ci --silent && exec \"$$@\"", "--"]

  install:
    extends:
      service: node-base
    command: ["echo", "Dependencies installed"]

  lint:
    extends:
      service: node-base
    command: ["npm", "run", "lint"]

  typecheck:
    extends:
      service: node-base
    command: ["npm", "run", "typecheck"]

  format-check:
    extends:
      service: node-base
    command: ["npx", "prettier", "--check", "**/*.{ts,tsx}"]

  build:
    extends:
      service: node-base
    command: ["npm", "run", "build"]

  serve:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    ports:
      - "3000:80"

volumes:
  node_modules:
